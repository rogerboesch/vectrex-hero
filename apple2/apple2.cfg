# apple2.cfg -- ld65 linker configuration for Apple IIe Hi-Res game
#
# Memory layout:
#   $0800-$1FFF  Buffers, stack area (free RAM below Hi-Res)
#   $2000-$3FFF  Hi-Res Page 1 (display) -- NOT linked, written at runtime
#   $4000-$5FFF  Hi-Res Page 2 (background) -- NOT linked, written at runtime
#   $6000-$BEFF  Program code + data + BSS
#   $BF00-$BFFF  ProDOS global page (reserved)

FEATURES {
    STARTADDRESS: default = $6000;
}

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0400;
}

MEMORY {
    ZP:      file = "",  start = $0080, size = $0040, type = rw, define = yes;
    HEADER:  file = %O,  start = $6000, size = $0004, fill = yes;
    RAM:     file = %O,  start = $6004, size = $5EFC, fill = yes, define = yes;
    BUFFERS: file = "",  start = $0800, size = $1800, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    STARTUP:  load = RAM,     type = ro;
    LOWCODE:  load = RAM,     type = ro,  optional = yes;
    CODE:     load = RAM,     type = ro;
    RODATA:   load = RAM,     type = ro;
    DATA:     load = RAM,     type = rw;
    BSS:      load = RAM,     type = bss, define = yes;
    INIT:     load = RAM,     type = bss, optional = yes;
    ONCE:     load = RAM,     type = ro,  optional = yes;
}
